<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal A — GID Lab G4</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .portal-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(26,35,126,0.12);
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .portal-logo {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    .portal-title {
      color: #1a237e;
      font-weight: 700;
      font-size: 1.6rem;
      margin-bottom: 0.25rem;
    }
    .portal-subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .btn-login {
      background-color: #1a237e;
      color: white;
      border: none;
      padding: 0.75rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-login:hover {
      background-color: #283593;
      color: white;
    }
    .footer-note {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="portal-card">
    <div class="portal-logo">🔵</div>
    <div class="portal-title">Portal A</div>
    <div class="portal-subtitle">GID Lab — Grupo 4 &nbsp;|&nbsp; SP1</div>

    <a href="/login" class="btn btn-login">
      Entrar com SSO
    </a>

    <div class="footer-note">
      Autenticação via Keycloak (OpenID Connect)
    </div>
  </div>

</body>
</html>
